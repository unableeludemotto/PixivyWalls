name: PixivyWalls Bot Execution

on:
  schedule:
    - cron: "30 0 * * *"   # Daily at 6:00 AM IST (00:30 UTC)
  workflow_dispatch:         # Manual execution feature

permissions:
  contents: write            # Gives explicit repo write bypass token

jobs:
  generate-wallpapers:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 📦 Install script requirements
        run: pip install -r requirements.txt

      - name: 🤖 Execute PixivyWalls Base Script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python bot.py

      - name: 💾 Commit & Deploy Output to GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/wallpapers.json docs/wallpapers_full.json
          git diff --cached --quiet || git commit -m "chore: update PixivyWalls asset structures $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
