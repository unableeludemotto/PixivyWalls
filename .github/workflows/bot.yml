name: Auto Update TV Wallpapers

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every single day at midnight
  workflow_dispatch: # Allows you to also trigger it manually whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run CineVault Bot
      env:
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      run: python bot.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add docs/wallpapers.json docs/wallpapers_full.json
        git commit -m "Automated TMDB backdrop rotation" || exit 0
        git push
