name: PixivyWalls Bot Execution

on:
  schedule:
    - cron: "30 0 * * *"   # Runs automatically every day at 6:30 AM IST (00:30 UTC)
  workflow_dispatch:         # Manual Trigger Button

permissions:
  contents: write

jobs:
  generate-wallpapers:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false     # Prevents Git from hanging on image folder verification scans

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install script requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🅰️ Download Clean Font for Canvas Rendering
        run: |
          mkdir -p assets
          curl -sL "https://github.com/googlefonts/roboto/raw/main/src/hinted/Roboto-Regular.ttf" -o assets/Roboto.ttf

      - name: 🤖 Execute Card Generation Composite Engine
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python bot.py

      - name: 💾 Commit & Deploy Output Images to Branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add current daily assets to commit indexing stage
          git add docs/images/*.jpg docs/wallpapers.json
          
          # Automatically stages file deletions for old images removed natively by python
          git add -u docs/images/
          
          git diff --cached --quiet || git commit -m "chore: refresh composite info-cards $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
